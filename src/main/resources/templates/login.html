<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">
  <title>Clique</title>
</head>
<style>
  .btn-default {
    position: relative;
    left: 42%;
    background-color: antiquewhite;
    color: black;
    border-color: wheat;
  }

  .btn-default:hover, .btn-default:focus, .btn-default:active, .btn-default.active, .open .dropdown-toggle.btn-default {
    background-color: wheat;
    color: black;
    border-color: wheat;
  }

  .carousel .slide .carousel-item img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
</style>
<body>
<div>
  <div>

    <div id="carouselExampleIndicators" style="max-height: 100%;" class="carousel slide"
         data-ride="carousel">
      <ol class="carousel-indicators">
        <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="3"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="4"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="5"></li>
      </ol>
      <div class="carousel-inner" style="max-height: inherit">
        <div class="carousel-item active">
          <img
              th:src="@{/clique-background.jpg}" alt="First slide">
        </div>
        <div class="carousel-item">
          <img
              th:src="@{/clique-drinks.jpg}" alt="Second slide">
        </div>
        <div class="carousel-item">
          <img
              th:src="@{/clique-drinks1.jpg}" alt="Third slide">
        </div>
        <div class="carousel-item">
          <img th:src="@{/clique-dj.jpg}" alt="Fourth slide">
        </div>
        <div class="carousel-item">
          <img th:src="@{/clique-boka.jpg}" alt="Fifth slide">
        </div>
        <div class="carousel-item">
          <img th:src="@{/clique-moet.jpg}" alt="Sixth slide">
        </div>
      </div>
      <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button"
         data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>
      <a class="carousel-control-next" href="#carouselExampleIndicators" role="button"
         data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>
    </div>
    <div class="mainPitch" style="position:absolute; top:20%; right: 35%">
      <form class="form-signin mt-xl-5" method="post" action="/login">
        <h2 class="form-signin-heading"
            style="width: 500px; font-size: large; color: antiquewhite; text-align: center">
          Добредојде во системот за управување на резервации на Cabaret Clique</h2>
        <p>
          <label for="username" class="sr-only">Username</label>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Username" required=""
                 style="width: 200px; text-align: center; position: relative; left:30%"
                 autofocus="">
        </p>
        <p>
          <label for="password" class="sr-only">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Password"
                 style="width: 200px; text-align: center; position: relative; left:30%"
                 required="">
        </p>


        <div th:if="${hasError}">
          <div th:insert="~{::errorModal}" th:with="errorText=${error}"></div>
        </div>
        <button class="btn btn-default" type="submit">Најава</button>
      </form>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
<script>
  $('.carousel').carousel({
    interval: 2000
  })
</script>
</body>

</html>
